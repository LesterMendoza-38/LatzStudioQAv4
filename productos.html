<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Productos | Latz Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* 1. Ajustes del Banner Estático */
    .banner-estatico {
      width: 100%;
      height: 300px;
      background-image: url('img/BannerPrincipal1.png');
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }

    .banner-estatico h2 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
      padding: 0 15px; /* Espacio para que el texto no toque los bordes */
    }

    /* 2. MEDIA QUERIES PARA CELULAR (Pantallas menores a 768px) */
    @media (max-width: 768px) {
      /* Ajustamos la Navbar */
      .navbar {
        flex-direction: column; /* Apila logo, título y menú */
        height: auto; /* Que crezca según el contenido */
        padding: 20px 10px;
      }

      .nav-center {
        margin: 15px 0;
      }

      .menu {
        flex-wrap: wrap; /* Si son muchos links, que bajen */
        justify-content: center;
        padding: 0;
        gap: 10px;
      }

      /* Reducimos el tamaño del banner en móvil */
      .banner-estatico {
        height: 200px;
      }

      .banner-estatico h2 {
        font-size: 1.8rem; /* Letra más pequeña para que quepa */
      }

      /* Ajustamos los botones de filtro */
      .filter-btn {
        font-size: 10px;
        padding: 6px 12px;
        width: 45%; /* Dos botones por fila en móvil */
      }
    }
  </style>
</head>
<body>

<header>
  <nav class="navbar">
    <div class="nav-left">
      <img src="img/Logo_Latzv2.png" alt="Logo Latz Studio" class="nav-logo">
    </div>
    <div class="nav-center">
      <h1 class="nav-title">Latz Studio</h1>
    </div>
    <div class="nav-right">
      <ul class="menu">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="nosotros.html">Nosotros</a></li>
        <li><a href="productos.html">Productos</a></li>
        <li><a href="login.html" class="login-btn">Login</a></li>
      </ul>
    </div>
  </nav>

  <div class="banner-estatico">
    <h2>Nuestra Colección</h2>
  </div>
</header>

<div class="container mt-5">
    <div class="d-flex justify-content-center gap-3 mb-5 flex-wrap">
      <button class="filter-btn active" onclick="filtrar('todos', this)">Todos</button>
      <button class="filter-btn" onclick="filtrar('labiales', this)">Labiales & Gloss</button>
      <button class="filter-btn" onclick="filtrar('hidratantes', this)">Cremas e Hidratantes</button>
      <button class="filter-btn" onclick="filtrar('peines', this)">Peines & Dyson</button>
    </div>

    <main id="grid-productos" class="product-grid"></main>
</div>

<script src="app-productos.js"></script>

<a href="https://wa.me/50230306115" class="whatsapp-btn" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
</a>

</body>
</html>
