<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - Latz Studio</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      background: #f4f4f4; /* Fondo gris muy claro para elegancia */
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .login-card img {
      height: 80px;
      margin-bottom: 20px;
    }
    .form-control {
      border: 1px solid #eee;
      border-radius: 5px;
      padding: 12px;
      margin-bottom: 20px;
    }
    .btn-login {
      background: #333;
      color: white;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 5px;
      transition: 0.3s;
    }
    .btn-login:hover {
      background: #000;
    }
    .back-link {
      display: block;
      margin-top: 20px;
      font-size: 14px;
      color: #888;
      text-decoration: none;
    }
  </style>
</head>
<body>

<div class="login-card">
  <img src="img/Logo_Latzv2.png" alt="Latz Studio">
  <h2 class="mb-4" style="font-weight: 300;">Bienvenida</h2>
  <form id="loginForm">
    <input type="text" class="form-control" placeholder="Usuario" required>
    <input type="password" class="form-control" placeholder="Contraseña" required>
    <button type="submit" class="btn-login">Entrar</button>
  </form>
  <a href="index.html" class="back-link">← Volver a la tienda</a>
<script>
  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    
    // Capturamos los datos de los inputs
    const usuario = e.target[0].value;
    const password = e.target[1].value;

    try {
      const response = await fetch("http://localhost:3000/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ usuario, password })
      });

      const data = await response.json();

      if (data.success) {
        // Guardamos el nombre en el navegador y volvemos al inicio
        localStorage.setItem("usuarioLogueado", data.nombre);
        window.location.href = "index.html";
      } else {
        alert("Credenciales incorrectas. Intenta de nuevo.");
      }
    } catch (error) {
      alert("Error al conectar con el servidor. Revisa que node server.js esté corriendo.");
    }
  });
</script>
</div>

</body>
</html>
